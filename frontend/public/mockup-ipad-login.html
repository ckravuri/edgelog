<!DOCTYPE html>
<html>
<head>
  <title>EdgeLog - iPad Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col">
  <!-- Status Bar -->
  <div class="flex justify-between items-center text-sm p-6 px-10">
    <span>9:41</span>
    <div class="flex items-center gap-2">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <span>100%</span>
      <svg class="w-8 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <!-- Content -->
  <div class="flex-1 flex flex-col items-center justify-center px-8">
    <!-- Logo -->
    <div class="mb-8">
      <svg width="120" height="120" viewBox="0 0 100 100">
        <rect width="100" height="100" rx="22" fill="#0a0a0a"/>
        <g transform="translate(15, 20)">
          <polyline points="5,55 20,30 35,45 55,15" fill="none" stroke="#22C55E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="55" y1="15" x2="65" y2="5" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
          <line x1="65" y1="5" x2="52" y2="8" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
          <line x1="65" y1="5" x2="62" y2="18" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
        </g>
      </svg>
    </div>

    <h1 class="text-5xl font-bold tracking-widest mb-3">EDGELOG</h1>
    <p class="text-gray-400 text-xl mb-16">Your Trading Edge, Journaled</p>

    <!-- Buttons -->
    <div class="w-full max-w-md space-y-5">
      <button class="w-full bg-white text-black font-semibold py-5 rounded-2xl flex items-center justify-center text-lg">
        <svg class="w-6 h-6 mr-3" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <button class="w-full bg-white text-black font-semibold py-5 rounded-2xl flex items-center justify-center text-lg">
        <svg class="w-6 h-6 mr-3" fill="currentColor" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Continue with Apple
      </button>
    </div>

    <p class="text-gray-500 text-base mt-12">By continuing, you agree to our <span class="text-green-500 underline">Privacy Policy</span></p>
  </div>

  <!-- Home Indicator -->
  <div class="pb-4 flex justify-center">
    <div class="w-40 h-1.5 bg-gray-600 rounded-full"></div>
  </div>
</body>
</html>
