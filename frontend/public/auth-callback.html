<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EdgeLog - Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container { text-align: center; padding: 40px; max-width: 400px; }
        .icon {
            width: 80px; height: 80px; margin: 0 auto 24px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .icon svg { width: 40px; height: 40px; fill: white; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { font-size: 24px; margin-bottom: 12px; }
        p { color: #888; margin-bottom: 16px; }
        .btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            padding: 18px 32px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 18px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            margin-top: 32px;
            text-align: center;
            position: relative;
        }
        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .arrow {
            position: absolute;
            top: -60px;
            right: 20px;
            font-size: 40px;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .error { color: #ef4444; margin-bottom: 16px; }
        #loading { display: block; }
        #success { display: none; }
        #error-state { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="icon"><div class="spinner"></div></div>
            <h1>Completing Sign In...</h1>
            <p>Please wait while we authenticate you.</p>
        </div>
        <div id="success">
            <div class="icon">
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <h1>Sign In Successful!</h1>
            <p>You're all set and ready to go.</p>
            <div style="position: relative; margin-top: 40px;">
                <div class="arrow">☝️</div>
                <button class="btn">Tap "Done" above to continue</button>
            </div>
        </div>
        <div id="error-state">
            <div class="icon" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </div>
            <h1>Sign In Failed</h1>
            <p class="error" id="error-message">An error occurred.</p>
            <button class="btn">Tap "Done" to close</button>
        </div>
    </div>
    <script>
        const API_URL = 'https://trade-journal-app-16.preview.emergentagent.com/api';
        
        const urlParams = new URLSearchParams(window.location.search);
        const authRequestId = urlParams.get('auth_request_id');
        
        async function processAuth() {
            try {
                const hash = window.location.hash;
                const sessionIdMatch = hash.match(/session_id=([^&]+)/);
                if (!sessionIdMatch) throw new Error('No session ID found.');
                const sessionId = sessionIdMatch[1];
                
                const response = await fetch(API_URL + '/auth/session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ session_id: sessionId }),
                });
                
                if (!response.ok) throw new Error('Authentication failed');
                
                const data = await response.json();
                const sessionToken = data.session_token;
                
                if (authRequestId) {
                    await fetch(API_URL + '/auth/native/store', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            auth_request_id: authRequestId,
                            session_token: sessionToken 
                        }),
                    });
                }
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('success').style.display = 'block';
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-state').style.display = 'block';
                document.getElementById('error-message').textContent = error.message;
            }
        }
        
        processAuth();
    </script>
</body>
</html>
