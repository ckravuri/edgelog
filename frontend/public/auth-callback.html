<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>EdgeLog - Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 24px;
        }
        .container { 
            text-align: center; 
            max-width: 320px;
            width: 100%;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 40px;
            color: #22c55e;
        }
        .checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.4s ease-out;
            box-shadow: 0 8px 32px rgba(34, 197, 94, 0.3);
        }
        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .checkmark svg {
            width: 40px;
            height: 40px;
            fill: white;
        }
        h1 { 
            font-size: 24px; 
            font-weight: 700;
            margin-bottom: 8px;
            color: white;
        }
        .subtitle { 
            color: #888; 
            font-size: 15px;
            margin-bottom: 32px;
        }
        
        /* Big Return Button */
        .return-btn {
            display: block;
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
        }
        .return-btn:active {
            transform: scale(0.98);
        }
        .return-btn svg {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        .hint {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }
        .hint strong {
            color: #999;
        }
        
        /* Loading State */
        .spinner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #222;
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            color: #888;
            font-size: 16px;
        }
        
        /* Error State */
        .error-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(239, 68, 68, 0.3);
        }
        .error-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-bottom: 24px;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
        }
        
        #loading { display: block; }
        #success { display: none; }
        #error-state { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">EDGELOG</div>
        
        <!-- Loading State -->
        <div id="loading">
            <div class="spinner-container">
                <div class="spinner"></div>
                <div class="loading-text">Signing you in...</div>
            </div>
        </div>
        
        <!-- Success State -->
        <div id="success">
            <div class="checkmark">
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <h1>You're all set!</h1>
            <p class="subtitle">Successfully signed in to EdgeLog</p>
            
            <button class="return-btn" id="returnBtn" onclick="returnToApp()">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42a.996.996 0 0 0-1.41 0l-6.59 6.59a.996.996 0 0 0 0 1.41l6.59 6.59a.996.996 0 1 0 1.41-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
                Return to EdgeLog
            </button>
            
            <p class="hint" id="hintText">
                Or tap the <strong>← back button</strong> or <strong>✕</strong> to close
            </p>
        </div>
        
        <!-- Error State -->
        <div id="error-state">
            <div class="error-icon">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </div>
            <h1>Sign in failed</h1>
            <p class="error-msg" id="error-message">Something went wrong</p>
            <p class="hint">Please close this window and try again</p>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://edgelog-staging-3.preview.emergentagent.com/api';
        const urlParams = new URLSearchParams(window.location.search);
        const authRequestId = urlParams.get('auth_request_id');
        
        // Detect platform
        const ua = navigator.userAgent.toLowerCase();
        const isAndroid = ua.includes('android');
        const isIOS = /iphone|ipad|ipod/i.test(ua) && !isAndroid;
        
        console.log('Platform detection - Android:', isAndroid, 'iOS:', isIOS);
        console.log('Auth Request ID:', authRequestId);
        
        // Function to return to app - tries multiple methods
        function returnToApp() {
            if (!authRequestId) {
                // Just try to close if no auth request
                try { window.close(); } catch(e) {}
                return;
            }
            
            const deepLink = `edgelog://auth?auth_request_id=${authRequestId}&status=success`;
            
            // Method 1: Direct deep link
            window.location.href = deepLink;
            
            // Method 2: Intent URL for Android Chrome
            if (isAndroid) {
                setTimeout(() => {
                    const intentUrl = `intent://auth?auth_request_id=${authRequestId}&status=success#Intent;scheme=edgelog;package=com.ravuri.edgelog;end`;
                    window.location.href = intentUrl;
                }, 300);
            }
            
            // Method 3: Hidden iframe
            setTimeout(() => {
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = deepLink;
                document.body.appendChild(iframe);
            }, 100);
            
            // Update button text after attempt
            setTimeout(() => {
                document.getElementById('returnBtn').innerHTML = 
                    '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg> Close this window';
                document.getElementById('hintText').innerHTML = 
                    'Tap <strong>← back</strong> or <strong>✕</strong> to return to the app';
            }, 1000);
        }
        
        async function processAuth() {
            try {
                const hash = window.location.hash;
                console.log('Processing auth callback...');
                
                const sessionIdMatch = hash.match(/session_id=([^&]+)/);
                if (!sessionIdMatch) throw new Error('Session not found in URL');
                const sessionId = sessionIdMatch[1];
                
                // Get session token
                const response = await fetch(API_URL + '/auth/session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ session_id: sessionId }),
                });
                
                if (!response.ok) throw new Error('Authentication failed');
                const data = await response.json();
                console.log('Session token received');
                
                // Store token for native app to retrieve
                if (authRequestId) {
                    const storeResponse = await fetch(API_URL + '/auth/native/store', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            auth_request_id: authRequestId,
                            session_token: data.session_token 
                        }),
                    });
                    console.log('Token stored for native app, status:', storeResponse.status);
                }
                
                // Show success UI
                document.getElementById('loading').style.display = 'none';
                document.getElementById('success').style.display = 'block';
                
                // Update hint based on platform
                if (isIOS) {
                    document.getElementById('hintText').innerHTML = 
                        'Or tap the <strong>✕</strong> in the top corner';
                } else if (isAndroid) {
                    document.getElementById('hintText').innerHTML = 
                        'Or tap <strong>← back</strong> or swipe to close';
                }
                
                // Auto-try to return to app after a short delay
                if (authRequestId) {
                    setTimeout(() => {
                        returnToApp();
                    }, 800);
                }
                
            } catch (error) {
                console.error('Auth error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-state').style.display = 'block';
                document.getElementById('error-message').textContent = error.message;
            }
        }
        
        // Start processing
        processAuth();
    </script>
</body>
</html>
