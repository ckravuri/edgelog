<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EdgeLog - Completing Sign In...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container { text-align: center; padding: 40px; max-width: 400px; }
        .icon {
            width: 80px; height: 80px; margin: 0 auto 24px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .icon svg { width: 40px; height: 40px; fill: white; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { font-size: 24px; margin-bottom: 12px; }
        p { color: #888; margin-bottom: 32px; }
        .note { margin-top: 24px; font-size: 14px; color: #666; }
        .error { color: #ef4444; margin-bottom: 16px; }
        #loading { display: block; }
        #success { display: none; }
        #error-state { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="icon"><div class="spinner"></div></div>
            <h1>Completing Sign In...</h1>
            <p>Please wait while we authenticate you.</p>
        </div>
        <div id="success">
            <div class="icon">
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <h1>Sign In Successful!</h1>
            <p>Returning to EdgeLog...</p>
            <p class="note">This window will close automatically.<br>If it doesn't, you can close it manually.</p>
        </div>
        <div id="error-state">
            <div class="icon" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </div>
            <h1>Sign In Failed</h1>
            <p class="error" id="error-message">An error occurred.</p>
            <p class="note">Please close this window and try again.</p>
        </div>
    </div>
    <script>
        const API_URL = 'https://trade-journal-app-16.preview.emergentagent.com/api';
        
        // Get auth_request_id from URL if present
        const urlParams = new URLSearchParams(window.location.search);
        const authRequestId = urlParams.get('auth_request_id');
        
        async function processAuth() {
            try {
                const hash = window.location.hash;
                const sessionIdMatch = hash.match(/session_id=([^&]+)/);
                if (!sessionIdMatch) throw new Error('No session ID found.');
                const sessionId = sessionIdMatch[1];
                
                const response = await fetch(API_URL + '/auth/session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ session_id: sessionId }),
                });
                
                if (!response.ok) throw new Error('Authentication failed');
                
                const data = await response.json();
                const sessionToken = data.session_token;
                
                // Store token on server for native app to retrieve
                if (authRequestId) {
                    await fetch(API_URL + '/auth/native/store', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            auth_request_id: authRequestId,
                            session_token: sessionToken 
                        }),
                    });
                }
                
                // Show success message briefly
                document.getElementById('loading').style.display = 'none';
                document.getElementById('success').style.display = 'block';
                
                // Auto-close the browser after a short delay
                // The native app is polling for the auth token, so it will pick it up
                setTimeout(function() {
                    // Try to close the window/tab
                    window.close();
                    
                    // For iOS in-app browser, try using webkit message handler
                    if (window.webkit && window.webkit.messageHandlers) {
                        try {
                            window.webkit.messageHandlers.close.postMessage('close');
                        } catch (e) {
                            console.log('No webkit close handler');
                        }
                    }
                }, 1500);
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-state').style.display = 'block';
                document.getElementById('error-message').textContent = error.message;
            }
        }
        
        processAuth();
    </script>
</body>
</html>
