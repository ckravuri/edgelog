<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EdgeLog</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 24px;
        }
        .container { 
            text-align: center; 
            max-width: 320px;
            width: 100%;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 48px;
            color: #22c55e;
        }
        .checkmark {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            background: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.3s ease-out;
        }
        @keyframes scaleIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
        .checkmark svg {
            width: 36px;
            height: 36px;
            fill: white;
        }
        h1 { 
            font-size: 22px; 
            font-weight: 600;
            margin-bottom: 8px;
            color: white;
        }
        .subtitle { 
            color: #666; 
            font-size: 15px;
            margin-bottom: 40px;
        }
        .instruction {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
        }
        .instruction-text {
            font-size: 16px;
            color: #999;
            line-height: 1.5;
        }
        .instruction-text strong {
            color: white;
            font-weight: 600;
        }
        .spinner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #222;
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            color: #666;
            font-size: 15px;
        }
        .error-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-icon svg {
            width: 36px;
            height: 36px;
            fill: white;
        }
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .error-hint {
            color: #666;
            font-size: 14px;
        }
        #loading { display: block; }
        #success { display: none; }
        #error-state { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">EDGELOG</div>
        
        <div id="loading">
            <div class="spinner-container">
                <div class="spinner"></div>
                <div class="loading-text">Signing you in...</div>
            </div>
        </div>
        
        <div id="success">
            <div class="checkmark">
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <h1>You're signed in!</h1>
            <p class="subtitle">Your account is ready to use</p>
            <div class="instruction">
                <p class="instruction-text">
                    Tap the <strong>✕</strong> button in the<br>top-left corner to continue
                </p>
            </div>
        </div>
        
        <div id="error-state">
            <div class="error-icon">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </div>
            <h1>Sign in failed</h1>
            <p class="error-msg" id="error-message">Something went wrong</p>
            <p class="error-hint">Close this window and try again</p>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://edgelog-staging-3.preview.emergentagent.com/api';
        const urlParams = new URLSearchParams(window.location.search);
        const authRequestId = urlParams.get('auth_request_id');
        
        // Detect platform - be more inclusive for Android detection
        const userAgent = navigator.userAgent.toLowerCase();
        const isAndroid = userAgent.includes('android');
        const isIOS = /iphone|ipad|ipod/i.test(userAgent) && !isAndroid;
        
        // Debug: show detected platform
        console.log('User Agent:', userAgent);
        console.log('Is Android:', isAndroid);
        console.log('Is iOS:', isIOS);
        
        // Function to try opening the app via deep link
        function tryOpenApp(authRequestId) {
            const deepLink = `edgelog://auth?auth_request_id=${authRequestId}&status=success`;
            
            // Method 1: Create a hidden iframe (works in some browsers)
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = deepLink;
            document.body.appendChild(iframe);
            
            // Method 2: Try direct location change after a delay
            setTimeout(() => {
                window.location.href = deepLink;
            }, 100);
            
            // Method 3: Try intent URL for Chrome-based browsers
            setTimeout(() => {
                const intentUrl = `intent://auth?auth_request_id=${authRequestId}&status=success#Intent;scheme=edgelog;package=com.ravuri.edgelog;end`;
                window.location.href = intentUrl;
            }, 300);
        }
        
        async function processAuth() {
            try {
                const hash = window.location.hash;
                console.log('Processing auth, hash:', hash);
                console.log('Auth request ID:', authRequestId);
                
                const sessionIdMatch = hash.match(/session_id=([^&]+)/);
                if (!sessionIdMatch) throw new Error('Session not found');
                const sessionId = sessionIdMatch[1];
                
                console.log('Session ID found:', sessionId.substring(0, 10) + '...');
                
                const response = await fetch(API_URL + '/auth/session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ session_id: sessionId }),
                });
                
                console.log('Auth session response status:', response.status);
                
                if (!response.ok) throw new Error('Authentication failed');
                
                const data = await response.json();
                console.log('Got session token');
                
                if (authRequestId) {
                    console.log('Storing token for native app...');
                    const storeResponse = await fetch(API_URL + '/auth/native/store', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            auth_request_id: authRequestId,
                            session_token: data.session_token 
                        }),
                    });
                    console.log('Store response status:', storeResponse.status);
                }
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('success').style.display = 'block';
                
                // For Android: Try to redirect back to app
                if (isAndroid && authRequestId) {
                    console.log('Android detected - attempting deep link');
                    document.querySelector('.instruction-text').innerHTML = 
                        'Authentication successful!<br><strong>Opening EdgeLog app...</strong>';
                    
                    // Try to open the app after a short delay
                    setTimeout(() => {
                        tryOpenApp(authRequestId);
                        
                        // After 2 seconds, update the message with manual instructions
                        setTimeout(() => {
                            document.querySelector('.instruction-text').innerHTML = 
                                'Login successful!<br><br><strong>Tap the X or ← button</strong><br>to return to the app';
                        }, 2000);
                    }, 500);
                    return; // Don't run iOS block
                }
                
                // For iOS: Show close instruction
                if (isIOS && authRequestId) {
                    document.querySelector('.instruction-text').innerHTML = 
                        'Tap the <strong>✕</strong> button in the<br>top-left corner to continue';
                }
                
            } catch (error) {
                console.error('Auth error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-state').style.display = 'block';
                document.getElementById('error-message').textContent = error.message;
            }
        }
        
        processAuth();
    </script>
</body>
</html>
