<!DOCTYPE html>
<html>
<head>
  <title>EdgeLog App Icon - Download</title>
  <style>
    body {
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui;
      color: white;
      gap: 20px;
    }
    h1 { margin: 0; color: #22C55E; font-size: 24px; }
    .icon-box {
      text-align: center;
    }
    .icon-box img {
      border-radius: 22%;
      box-shadow: 0 10px 40px rgba(34, 197, 94, 0.3);
    }
    .icon-box p {
      margin-top: 15px;
      color: #888;
      font-size: 14px;
    }
    a.download-btn {
      margin-top: 20px;
      background: #22C55E;
      color: #000;
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
    a.download-btn:hover {
      background: #16A34A;
    }
  </style>
</head>
<body>
  <h1>EdgeLog App Icon (1024x1024)</h1>
  <div class="icon-box">
    <img src="/app-icons/icon-1024.png" width="300" height="300" alt="App Icon 1024x1024">
    <p>1024 × 1024 px — Required for App Store</p>
  </div>
  <a class="download-btn" href="/app-icons/icon-1024.png" download="EdgeLog-AppIcon-1024.png">Download Icon</a>
</body>
</html>
