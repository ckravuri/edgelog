<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background - solid dark -->
  <rect width="1024" height="1024" fill="#050505"/>
  
  <!-- Soft glow behind -->
  <ellipse cx="512" cy="512" rx="200" ry="180" fill="#22C55E" opacity="0.08"/>
  
  <!-- Zigzag trending arrow: up, down, up with arrow head -->
  <g filter="url(#glow)">
    <!-- Main zigzag line: bottom-left up, then down, then up to arrow -->
    <path 
      d="M 300 620 L 420 420 L 540 580 L 700 340" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="36" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    <!-- Arrow head - vertical line going UP -->
    <path 
      d="M 700 340 L 700 240" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="36" 
      stroke-linecap="round"
    />
    <!-- Arrow head - horizontal line going LEFT -->
    <path 
      d="M 700 240 L 600 240" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="36" 
      stroke-linecap="round"
    />
  </g>
</svg>
