<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background - solid dark -->
  <rect width="1024" height="1024" fill="#0a0a0a"/>
  
  <!-- Soft green glow behind the icon -->
  <ellipse cx="512" cy="512" rx="280" ry="250" fill="#22C55E" opacity="0.08"/>
  
  <g filter="url(#glow)">
    <!-- Zigzag line: starts bottom-left, goes up, down (V shape), then up to arrow -->
    <polyline 
      points="240,680 400,400 540,580 680,320" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="36" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    
    <!-- Arrow line continuing up-right -->
    <line 
      x1="680" y1="320" 
      x2="780" y2="220" 
      stroke="url(#arrowGradient)" 
      stroke-width="36" 
      stroke-linecap="round"
    />
    
    <!-- Arrowhead - solid triangle pointing up-right (45 degrees) -->
    <polygon 
      points="780,220 710,230 720,300" 
      fill="#22C55E"
    />
  </g>
</svg>
