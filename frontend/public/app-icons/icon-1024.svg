<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background - solid dark -->
  <rect width="1024" height="1024" fill="#050505"/>
  
  <!-- Soft glow behind -->
  <ellipse cx="520" cy="480" rx="220" ry="200" fill="#22C55E" opacity="0.06"/>
  
  <!-- Zigzag trending line ending with arrow pointing UP-RIGHT -->
  <g filter="url(#glow)">
    <!-- Main zigzag path: bottom-left, up, down to valley, then up toward arrow tip -->
    <polyline 
      points="220,680 380,420 520,600 720,260" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="40" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    <!-- Arrow head - pointing UP-RIGHT (↗) from the tip -->
    <!-- This creates a "<" shape rotated to point up-right -->
    <polyline 
      points="620,260 720,260 720,360" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="40" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
  </g>
</svg>
