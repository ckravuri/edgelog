<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background - solid dark -->
  <rect width="1024" height="1024" fill="#050505"/>
  
  <!-- Soft glow behind -->
  <ellipse cx="512" cy="512" rx="180" ry="160" fill="#22C55E" opacity="0.06"/>
  
  <!-- Zigzag trending arrow with arrow head at end -->
  <g filter="url(#glow)">
    <!-- Main zigzag line -->
    <polyline 
      points="300,620 420,400 540,580 700,320" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="32" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    <!-- Arrow head pointing up-right (L shape at top) -->
    <polyline 
      points="600,220 700,220 700,320" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="32" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
  </g>
</svg>
