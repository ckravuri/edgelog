<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>
  
  <!-- Glow effect behind arrow -->
  <ellipse cx="512" cy="480" rx="300" ry="250" fill="#22C55E" opacity="0.1" filter="url(#glow)"/>
  
  <!-- TrendingUp Arrow - matching lucide-react icon style -->
  <!-- The icon: polyline going up then arrow head at top-right corner -->
  <g filter="url(#glow)">
    <!-- Main trend line: bottom-left to middle-top to right -->
    <polyline 
      points="200,750 450,350 824,550" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="64" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    <!-- Arrow head - vertical line pointing UP from top-right -->
    <line 
      x1="824" y1="550" 
      x2="824" y2="280" 
      stroke="url(#arrowGradient)" 
      stroke-width="64" 
      stroke-linecap="round"
    />
    <!-- Arrow head - horizontal line pointing LEFT from top-right -->
    <line 
      x1="824" y1="280" 
      x2="554" y2="280" 
      stroke="url(#arrowGradient)" 
      stroke-width="64" 
      stroke-linecap="round"
    />
  </g>
</svg>
