<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background - solid dark -->
  <rect width="1024" height="1024" fill="#050505"/>
  
  <!-- Soft glow behind -->
  <ellipse cx="512" cy="500" rx="200" ry="180" fill="#22C55E" opacity="0.06"/>
  
  <!-- Zigzag trending line with upward arrow at end -->
  <g filter="url(#glow)">
    <!-- Main zigzag line: start low-left, go up, down to valley, then up to arrow -->
    <polyline 
      points="250,650 400,450 520,580 680,280" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="36" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    <!-- Arrow head pointing UPWARD (triangle at top) -->
    <!-- Left side of arrow head -->
    <line x1="680" y1="280" x2="600" y2="360" 
      stroke="url(#arrowGradient)" 
      stroke-width="36" 
      stroke-linecap="round"
    />
    <!-- Right side of arrow head -->
    <line x1="680" y1="280" x2="760" y2="360" 
      stroke="url(#arrowGradient)" 
      stroke-width="36" 
      stroke-linecap="round"
    />
  </g>
</svg>
