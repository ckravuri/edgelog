<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background - solid dark -->
  <rect width="1024" height="1024" fill="#050505"/>
  
  <!-- Soft glow behind -->
  <ellipse cx="512" cy="512" rx="350" ry="300" fill="#22C55E" opacity="0.08"/>
  
  <!-- TrendingUp Icon - matching the app exactly -->
  <g transform="translate(512, 512)" filter="url(#glow)">
    <!-- Main polyline: diagonal up from bottom-left, then slight down to right -->
    <polyline 
      points="-280,200 0,-150 280,50" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="56" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    <!-- Arrow head - line going UP from top-right point -->
    <line 
      x1="280" y1="50" 
      x2="280" y2="-170" 
      stroke="url(#arrowGradient)" 
      stroke-width="56" 
      stroke-linecap="round"
    />
    <!-- Arrow head - line going LEFT from top-right point -->
    <line 
      x1="280" y1="-170" 
      x2="60" y2="-170" 
      stroke="url(#arrowGradient)" 
      stroke-width="56" 
      stroke-linecap="round"
    />
  </g>
</svg>
