<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>
  
  <!-- Glow effect behind arrow -->
  <ellipse cx="512" cy="400" rx="250" ry="200" fill="#22C55E" opacity="0.12" filter="url(#glow)"/>
  
  <!-- Upward Trending Arrow (like TrendingUp icon) -->
  <g filter="url(#glow)">
    <!-- Main diagonal line going up-right -->
    <path 
      d="M250 650 L512 350 L774 550" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="72" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    <!-- Arrow head pointing up-right -->
    <path 
      d="M774 550 L774 380 M774 550 L604 550" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="72" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
  </g>
</svg>
