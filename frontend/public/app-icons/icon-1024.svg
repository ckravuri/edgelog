<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>
  
  <!-- Glow effect behind arrow -->
  <ellipse cx="512" cy="450" rx="280" ry="220" fill="#22C55E" opacity="0.12" filter="url(#glow)"/>
  
  <!-- Upward Trending Arrow (like TrendingUp icon) - Arrow pointing UP and to the RIGHT -->
  <g filter="url(#glow)">
    <!-- Main polyline: starts bottom-left, goes up to peak, then slightly down-right -->
    <polyline 
      points="220,680 512,320 804,520" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="72" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    <!-- Arrow head at top-right pointing UP-RIGHT -->
    <!-- Vertical line going UP from the endpoint -->
    <line x1="804" y1="520" x2="804" y2="320" 
      stroke="url(#arrowGradient)" 
      stroke-width="72" 
      stroke-linecap="round"
    />
    <!-- Horizontal line going LEFT from the endpoint -->
    <line x1="804" y1="320" x2="604" y2="320" 
      stroke="url(#arrowGradient)" 
      stroke-width="72" 
      stroke-linecap="round"
    />
  </g>
</svg>
