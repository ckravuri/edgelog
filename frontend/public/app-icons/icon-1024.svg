<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background - solid dark -->
  <rect width="1024" height="1024" fill="#0a0a0a"/>
  
  <!-- Soft green glow behind the icon -->
  <ellipse cx="512" cy="512" rx="280" ry="250" fill="#22C55E" opacity="0.08"/>
  
  <g filter="url(#glow)">
    <!-- Zigzag line: V shape then up to arrow -->
    <polyline 
      points="250,620 400,380 530,560 700,280" 
      fill="none" 
      stroke="#22C55E" 
      stroke-width="38" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    
    <!-- Arrow stem going up-right at 45 degrees -->
    <line 
      x1="700" y1="280" 
      x2="760" y2="220" 
      stroke="#22C55E" 
      stroke-width="38" 
      stroke-linecap="round"
    />
    
    <!-- Arrowhead - two lines forming > shape pointing up-right -->
    <polyline 
      points="680,220 760,220 760,300" 
      fill="none" 
      stroke="#22C55E" 
      stroke-width="38" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
  </g>
</svg>
