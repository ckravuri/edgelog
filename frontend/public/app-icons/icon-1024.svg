<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background - solid dark -->
  <rect width="1024" height="1024" fill="#080808"/>
  
  <!-- Soft green glow behind the icon -->
  <ellipse cx="512" cy="500" rx="260" ry="240" fill="#22C55E" opacity="0.07"/>
  
  <g filter="url(#glow)">
    <!-- Zigzag line: starts, goes up, down (V), then up toward arrow tip -->
    <polyline 
      points="260,640 390,400 520,570 680,310" 
      fill="none" 
      stroke="#22C55E" 
      stroke-width="42" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    
    <!-- Arrow tip line continuing diagonally up-right -->
    <line 
      x1="680" y1="310" 
      x2="740" y2="250" 
      stroke="#22C55E" 
      stroke-width="42" 
      stroke-linecap="square"
    />
    
    <!-- Arrowhead - clean angular lines -->
    <line x1="740" y1="250" x2="665" y2="265" stroke="#22C55E" stroke-width="42" stroke-linecap="round"/>
    <line x1="740" y1="250" x2="725" y2="325" stroke="#22C55E" stroke-width="42" stroke-linecap="round"/>
  </g>
</svg>
