<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="256" y1="0" x2="256" y2="1024" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="512" y1="0" x2="512" y2="1024" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="768" y1="0" x2="768" y2="1024" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="256" x2="1024" y2="256" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="512" x2="1024" y2="512" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="768" x2="1024" y2="768" stroke="#FFFFFF" stroke-width="1"/>
  </g>
  
  <!-- Glow effect behind arrow -->
  <ellipse cx="512" cy="420" rx="200" ry="150" fill="#22C55E" opacity="0.15" filter="url(#glow)"/>
  
  <!-- Trending Up Arrow -->
  <g transform="translate(512, 380)" filter="url(#glow)">
    <path 
      d="M-180 100 L0 -100 L180 100" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="56" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    <!-- Arrow head -->
    <path 
      d="M180 100 L180 -20 M180 100 L60 100" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="56" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
  </g>
  
  <!-- EDGELOG Text -->
  <text 
    x="512" 
    y="680" 
    text-anchor="middle" 
    font-family="Arial Black, Helvetica, sans-serif" 
    font-size="120" 
    font-weight="900" 
    letter-spacing="24"
    fill="#FFFFFF"
  >
    EDGELOG
  </text>
  
  <!-- Tagline -->
  <text 
    x="512" 
    y="760" 
    text-anchor="middle" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="42" 
    font-weight="400" 
    letter-spacing="8"
    fill="#71717A"
  >
    TRADING JOURNAL
  </text>
</svg>
