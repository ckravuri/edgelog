<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background - solid dark -->
  <rect width="1024" height="1024" fill="#050505"/>
  
  <!-- Soft glow behind -->
  <ellipse cx="512" cy="512" rx="320" ry="280" fill="#22C55E" opacity="0.1"/>
  
  <!-- TrendingUp Icon using single path -->
  <g filter="url(#glow)">
    <!-- Combined path for the trend line and arrow -->
    <path 
      d="M 200 720 L 480 340 L 780 540 M 780 540 L 780 300 M 780 300 L 540 300" 
      fill="none" 
      stroke="url(#arrowGradient)" 
      stroke-width="52" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
  </g>
</svg>
